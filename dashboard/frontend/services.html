<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Services — NodeBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">NodeBox</a>
    <a href="/">Dashboard</a>
    <a href="/connect.html">Connect</a>
    <a href="/services.html" class="active">Services</a>
    <a href="/updates.html" id="nav-updates">Updates</a>
    <a href="/mempool/" target="_blank">mempool</a>
  </nav>

  <main>
    <h1>Optional Services</h1>
    <div class="update-list">

      <div class="update-item" id="item-public-pool">
        <div class="update-item-info">
          <h2>Public Pool</h2>
          <p id="desc-public-pool">Solo mining pool for your home network. Connect your miner to <code>nodebox.local:3333</code>.</p>
        </div>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <span class="badge badge-loading" id="badge-public-pool">…</span>
          <a href="/pool/" target="_blank" class="btn btn-primary" id="link-public-pool" style="display:none;text-decoration:none">Open UI</a>
          <button class="btn btn-primary" id="btn-public-pool" onclick="startInstall('public-pool')" disabled>Install</button>
        </div>
        <div class="log-box" id="log-public-pool"></div>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
  <script>
    async function load() {
      const svc = await fetchServices();
      if (!svc) return;

      const pool = svc['public-pool'];
      const badge = document.getElementById('badge-public-pool');
      const btn   = document.getElementById('btn-public-pool');
      const link  = document.getElementById('link-public-pool');

      if (pool.running) {
        badge.className = 'badge badge-ok';
        badge.textContent = 'Running';
        btn.style.display = 'none';
        link.style.display = '';
      } else if (pool.installed) {
        badge.className = 'badge badge-error';
        badge.textContent = 'Stopped';
        btn.style.display = 'none';
        link.style.display = '';
      } else {
        badge.className = 'badge badge-loading';
        badge.textContent = 'Not installed';
        btn.disabled = false;
      }
    }

    async function startInstall(service) {
      if (!confirm('Install Public Pool? This takes about 10 minutes and will briefly restart bitcoind.')) return;

      const btn = document.getElementById(`btn-${service}`);
      const log = document.getElementById(`log-${service}`);

      btn.disabled = true;
      log.textContent = '';
      log.classList.add('active');

      const res = await fetch(`/nodebox/install/${service}`, { method: 'POST' });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const text = line.slice(6);
            log.textContent += text + '\n';
            log.scrollTop = log.scrollHeight;
            if (text === '[done]') setTimeout(load, 1000);
          }
        }
      }
    }

    load();
  </script>
</body>
</html>
