# NodeBox — Fulcrum configuration

bitcoind = 127.0.0.1:8332
rpccookie = /data/bitcoin/.cookie
datadir = /data/fulcrum/fulcrum_db
cert = /data/fulcrum/cert.pem
key = /data/fulcrum/key.pem
ssl = 0.0.0.0:50002
tcp = 0.0.0.0:50001
peering = false
zmq_allow_hashtx = true

# Memory budget for the database (MB).
# 2048 works well on a 16 GB system; lower to 1024 on 8 GB.
db_mem = 2048.0
