# NodeBox — Bitcoin Core configuration

server=1
txindex=1
blockfilterindex=1
peerblockfilters=1
coinstatsindex=1
disablewallet=1
listen=1

# Privacy: Tor + I2P only, no clearnet
onlynet=onion
onlynet=i2p
bind=127.0.0.1
bind=127.0.0.1=onion
proxy=unix:/run/tor/socks
i2psam=127.0.0.1:7656

# RPC cookie readable by group (fulcrum, dashboard)
rpccookieperms=group

nodebuglogfile=1
uacomment=NodeBox

# ZMQ notifications for mempool.space
zmqpubhashblock=tcp://127.0.0.1:8433
zmqpubhashtx=tcp://127.0.0.1:9332
