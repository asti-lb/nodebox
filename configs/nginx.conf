# NodeBox — Nginx site configuration
# Place in /etc/nginx/sites-available/nodebox and symlink to sites-enabled/

server {
    listen 443 ssl;
    server_name nodebox.local;

    ssl_certificate     /etc/nginx/ssl/nodebox.crt;
    ssl_certificate_key /etc/nginx/ssl/nodebox.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Dashboard (root)
    location / {
        proxy_pass         http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # Required for Server-Sent Events (update log streaming)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # mempool.space — API (Angular app calls /api/v1/ directly from origin root)
    location /api/v1/ws {
        proxy_pass         http://127.0.0.1:8080/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
    }

    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8080/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location = /mempool/ {
        return 302 /mempool/en-US/;
    }

    location /resources/ {
        alias              /var/www/mempool/resources/;
    }

    location /mempool/ {
        alias              /var/www/mempool/;
        try_files          $uri $uri/ /mempool/en-US/index.html;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name nodebox.local;
    return 301 https://$host$request_uri;
}
